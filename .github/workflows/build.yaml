on:
  workflow_dispatch:
    inputs:
      ctan_repo:
        description: 'CTAN repository URL (e.g., https://ctan.math.illinois.edu/systems/texlive/tlnet). See https://ctan.org/mirrors/mirmon for available mirrors.'
        required: false
        type: string
        default: 'https://ctan.math.illinois.edu/systems/texlive/tlnet'
  schedule:
    - cron: '5 3 * * *'

name: Build TinyTeX Bundles

env:
  # for gh usage with external repo
  GH_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
  # required for GH to run on another repo (-R option)
  # https://cli.github.com/manual/gh_help_environment
  GH_REPO: rstudio/tinytex-releases
  # CTAN repository URL for TeX Live packages
  CTAN_REPO: ${{ inputs.ctan_repo || 'https://ctan.math.illinois.edu/systems/texlive/tlnet' }}

jobs:
  validate-ctan:
    runs-on: ubuntu-latest
    name: Validate CTAN repository
    outputs:
      texlive-year: ${{ steps.check-repo.outputs.texlive-year }}
    steps:
      - name: Check CTAN repository accessibility
        id: check-repo
        run: |
          echo "Validating CTAN repository: $CTAN_REPO"

          # Check if the repository is accessible by fetching the texlive.tlpdb file
          if ! curl --fail --silent --show-error --head "$CTAN_REPO/tlpkg/texlive.tlpdb" > /dev/null; then
            echo "✗ CTAN repository is not accessible or invalid"
            echo "Please check the URL: $CTAN_REPO"
            exit 1
          fi

          echo "✓ CTAN repository is valid and accessible"

          # Detect TeX Live version by checking for TEXLIVE_YYYY files
          echo "Detecting TeX Live version..."
          CURRENT_YEAR=$(date +%Y)
          TEXLIVE_YEAR=""

          # Check current year first, then previous year
          for year in $CURRENT_YEAR $((CURRENT_YEAR - 1)); do
            if curl --fail --silent --show-error --head "$CTAN_REPO/TEXLIVE_$year" > /dev/null 2>&1; then
              TEXLIVE_YEAR=$year
              break
            fi
          done

          if [ -n "$TEXLIVE_YEAR" ]; then
            echo "✓ TeX Live version: $TEXLIVE_YEAR"
            echo "texlive-year=$TEXLIVE_YEAR" >> $GITHUB_OUTPUT
          else
            echo "⚠ Could not detect version with current/previous year, checking older versions..."
            # Check for older TEXLIVE_YYYY files (going back 5 years)
            for offset in {2..5}; do
              year=$((CURRENT_YEAR - offset))
              if curl --fail --silent --show-error --head "$CTAN_REPO/TEXLIVE_$year" > /dev/null 2>&1; then
                TEXLIVE_YEAR=$year
                break
              fi
            done

            if [ -n "$TEXLIVE_YEAR" ]; then
              echo "✓ TeX Live version: $TEXLIVE_YEAR"
              echo "texlive-year=$TEXLIVE_YEAR" >> $GITHUB_OUTPUT
            else
              echo "⚠ Warning: Could not detect TeX Live version (no TEXLIVE_YYYY file found)"
              echo "texlive-year=unknown" >> $GITHUB_OUTPUT
            fi
          fi

  new-release:
    needs: [validate-ctan]
    runs-on: ubuntu-latest
    name: Create new daily draft release
    outputs:
      tag: ${{ steps.draft.outputs.tag }}
      draft-tag: ${{ steps.draft.outputs.draft-tag }}

    steps:
      - name: Create new draft release
        id: draft
        run: |
          tag=daily
          url=$(gh release create ${tag} --draft --prerelease --title "TinyTeX daily build" --notes "(WIP) Next daily release")
          echo "draft-tag=$(echo $url | grep -o tag/[^/]*$ | cut -c 5-)" >> $GITHUB_OUTPUT
          echo "tag=${tag}" >> $GITHUB_OUTPUT

  build-windows:
    needs: [new-release]
    runs-on: windows-latest
    name: Build Bundles For Windows

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Setup R for build
        uses: ./.github/actions/setup-r-for-build

      - name: Add TinyTeX to PATH
        run: |
          echo "$APPDATA\TinyTeX\bin\windows" >> $GITHUB_PATH
        shell: bash

      - name: Build TinyTeX-0-windows.exe
        run: |
          Rscript "tools/install-windows-base.R" # the infraonly scheme
          7z a -sfx TinyTeX-0-windows.exe $Env:APPDATA\\TinyTeX
          7z a TinyTeX-0.zip $Env:APPDATA\\TinyTeX

      - name: Build TinyTeX-1-windows.exe
        run: |
          Rscript "tools/install-windows-more.R"  # extra packages for compiling R Markdown
          7z a -sfx TinyTeX-1-windows.exe $Env:APPDATA\\TinyTeX
          7z a TinyTeX-1.zip $Env:APPDATA\\TinyTeX

      - name: Build TinyTeX-windows.exe
        run: |
          Rscript "tools/test-basic.R"  # even more LaTeX packages
          7z a -sfx TinyTeX-windows.exe $Env:APPDATA\\TinyTeX
          7z a TinyTeX.zip $Env:APPDATA\\TinyTeX

      - name: Build TinyTeX-2-windows.exe (scheme-full)
        run: |
          Rscript "tools/build-scheme-full.R"
          7z a -sfx TinyTeX-2-windows.exe $Env:APPDATA\\TinyTeX
          Copy-Item TinyTeX-2-windows.exe TinyTeX-2.exe

      - name: Test Installation script
        env:
          TINYTEX_INSTALLER: TinyTeX-0
        run: tools\\install-bin-windows.bat
        shell: cmd

      - name: Upload bundles
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          retry_wait_seconds: 10
          command: |
            gh release upload ${{needs.new-release.outputs.draft-tag}} TinyTeX-0-windows.exe TinyTeX-1-windows.exe TinyTeX-windows.exe TinyTeX-2-windows.exe TinyTeX-0.zip TinyTeX-1.zip TinyTeX.zip TinyTeX-2.exe --clobber

  build-linux:
    needs: [new-release]
    name: Build Bundles For Linux
    runs-on: ubuntu-latest
    outputs:
      tlmgr-version: ${{ steps.tlmgr-version.outputs.TLMGR_VERSION }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Setup R for build
        uses: ./.github/actions/setup-r-for-build

      - name: Build texlive-local-deb
        run: |
          sudo apt install -y equivs
          wget https://cdn.jsdelivr.net/gh/scottkosty/install-tl-ubuntu/debian-control-texlive-in.txt
          equivs-build debian-*
          mv texlive-local*.deb texlive-local.deb

      - name: Build TinyTeX-0-linux-x86_64.tar.xz & install more packages
        run: |
          sed -i 's|# finished base|cp $OLDPWD/install-tl-unx.tar.gz tools/; Rscript tools/clean-tlpdb.R; tar Jcf TinyTeX-0-linux-x86_64.tar.xz -C ~ .TinyTeX; cp TinyTeX-0-linux-x86_64.tar.xz TinyTeX-0.tar.gz|' tools/install-unx.sh
          ./tools/install-unx.sh
          # tlmgr path add will add in this folder which is not on PATH by default
          # (can be checked with tlmgr options sys_bin)
          echo "$HOME/bin" >> $GITHUB_PATH
          ls -lisa "$HOME/bin"

      - name: Build TinyTeX-1-linux-x86_64.tar.xz with new packages installed
        run: |
          Rscript "tools/clean-tlpdb.R"
          tar Jcf TinyTeX-1-linux-x86_64.tar.xz -C ~ .TinyTeX
          cp TinyTeX-1-linux-x86_64.tar.xz TinyTeX-1.tar.gz

      - name: Build TinyTeX-linux-x86_64.tar.xz
        run: |
          Rscript "tools/test-basic.R"
          tar Jcf TinyTeX-linux-x86_64.tar.xz -C ~ .TinyTeX
          cp TinyTeX-linux-x86_64.tar.xz TinyTeX.tar.gz

      - name: Build TinyTeX-2-linux-x86_64.tar.xz (scheme-full)
        run: |
          Rscript "tools/build-scheme-full.R"
          tar Jcf TinyTeX-2-linux-x86_64.tar.xz -C ~ .TinyTeX
          cp TinyTeX-2-linux-x86_64.tar.xz TinyTeX-2.tar.gz

      - name: Export Regex file
        run: |
          Rscript "tools/export-regex.R"
          tar zcf regex.tar.gz regex.json

      - name: Build *nix installer bundle
        working-directory: tools
        run: |
          cp install-base.sh install.sh
          echo "tlmgr install $(cat pkgs-custom.txt | tr '\n' ' ')" >> install.sh
          tar zcf ../installer-unix.tar.gz install-tl-unx.tar.gz tinytex.profile install.sh

      - name: Get Version information for daily build
        id: tlmgr-version
        run: |
          echo "TLMGR_VERSION<<EOFTLMGR" >> $GITHUB_OUTPUT
          ~/bin/tlmgr version | sed -n '1p;3p' >> $GITHUB_OUTPUT
          echo "EOFTLMGR" >> $GITHUB_OUTPUT

      - name: Test Installation script
        env:
          TINYTEX_INSTALLER: TinyTeX-0
        run: ./tools/install-bin-unix.sh

      - run: ls -lisa

      - name: Upload bundles
        # this specific action is used at some issues have been observe with gh while uploading assets
        # This allows to not fail the workflow on upload, but retry a few time
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          retry_wait_seconds: 10
          command: |
            gh release upload ${{needs.new-release.outputs.draft-tag}} TinyTeX-0-linux-x86_64.tar.xz TinyTeX-1-linux-x86_64.tar.xz TinyTeX-linux-x86_64.tar.xz TinyTeX-2-linux-x86_64.tar.xz TinyTeX-0.tar.gz TinyTeX-1.tar.gz TinyTeX.tar.gz TinyTeX-2.tar.gz installer-unix.tar.gz regex.tar.gz texlive-local.deb --clobber

  build-linux-arm64:
    needs: [new-release]
    name: Build Bundles For Linux ARM64
    runs-on: ubuntu-24.04-arm

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Setup R for build
        uses: ./.github/actions/setup-r-for-build

      - name: Build TinyTeX-0-linux-arm64.tar.xz & install more packages
        run: |
          sed -i 's|# finished base|cp $OLDPWD/install-tl-unx.tar.gz tools/; Rscript tools/clean-tlpdb.R; tar Jcf TinyTeX-0-linux-arm64.tar.xz -C ~ .TinyTeX; cp TinyTeX-0-linux-arm64.tar.xz TinyTeX-0-arm64.tar.gz|' tools/install-unx.sh
          ./tools/install-unx.sh
          echo "$HOME/bin" >> $GITHUB_PATH
          ls -lisa "$HOME/bin"

      - name: Build TinyTeX-1-linux-arm64.tar.xz with new packages installed
        run: |
          Rscript "tools/clean-tlpdb.R"
          tar Jcf TinyTeX-1-linux-arm64.tar.xz -C ~ .TinyTeX
          cp TinyTeX-1-linux-arm64.tar.xz TinyTeX-1-arm64.tar.gz

      - name: Build TinyTeX-linux-arm64.tar.xz
        run: |
          Rscript "tools/test-basic.R"
          tar Jcf TinyTeX-linux-arm64.tar.xz -C ~ .TinyTeX
          cp TinyTeX-linux-arm64.tar.xz TinyTeX-arm64.tar.gz

      - name: Build TinyTeX-2-linux-arm64.tar.xz (scheme-full)
        run: |
          Rscript "tools/build-scheme-full.R"
          tar Jcf TinyTeX-2-linux-arm64.tar.xz -C ~ .TinyTeX
          cp TinyTeX-2-linux-arm64.tar.xz TinyTeX-2-arm64.tar.gz

      - name: Test Installation script
        env:
          TINYTEX_INSTALLER: TinyTeX-0-arm64
        run: ./tools/install-bin-unix.sh

      - run: ls -lisa

      - name: Upload bundles
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          retry_wait_seconds: 10
          command: |
            gh release upload ${{needs.new-release.outputs.draft-tag}} TinyTeX-0-linux-arm64.tar.xz TinyTeX-1-linux-arm64.tar.xz TinyTeX-linux-arm64.tar.xz TinyTeX-2-linux-arm64.tar.xz TinyTeX-0-arm64.tar.gz TinyTeX-1-arm64.tar.gz TinyTeX-arm64.tar.gz TinyTeX-2-arm64.tar.gz --clobber

  build-mac:
    needs: [new-release]
    runs-on: macos-latest
    name: Build Bundles For macOS

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Setup R for build
        uses: ./.github/actions/setup-r-for-build

      - name: Build TinyTeX-0-darwin.tar.xz & install more packages
        run: |
          sed -i '' 's|# finished base|Rscript tools/clean-tlpdb.R; tar Jcf TinyTeX-0-darwin.tar.xz -C ~/Library TinyTeX; cp TinyTeX-0-darwin.tar.xz TinyTeX-0.tgz|' tools/install-unx.sh
          ./tools/install-unx.sh

      - name: Build TinyTeX-1-darwin.tar.xz with new packages installed
        run: |
          Rscript "tools/clean-tlpdb.R"
          tar Jcf TinyTeX-1-darwin.tar.xz -C ~/Library TinyTeX
          cp TinyTeX-1-darwin.tar.xz TinyTeX-1.tgz

      - name: Build TinyTeX-darwin.tar.xz
        run: |
          Rscript "tools/test-basic.R"
          tar Jcf TinyTeX-darwin.tar.xz -C ~/Library TinyTeX
          cp TinyTeX-darwin.tar.xz TinyTeX.tgz

      - name: Build TinyTeX-2-darwin.tar.xz (scheme-full)
        run: |
          Rscript "tools/build-scheme-full.R"
          tar Jcf TinyTeX-2-darwin.tar.xz -C ~/Library TinyTeX
          cp TinyTeX-2-darwin.tar.xz TinyTeX-2.tgz

      - name: Test Installation script
        env:
          TINYTEX_INSTALLER: TinyTeX-0
        run: ./tools/install-bin-unix.sh

      - run: ls -lisa

      - name: Upload bundles
        uses: nick-fields/retry@v3
        env:
          GH_DEBUG: api
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 10
          command: |
            gh release upload ${{needs.new-release.outputs.draft-tag}} TinyTeX-0-darwin.tar.xz TinyTeX-1-darwin.tar.xz TinyTeX-darwin.tar.xz TinyTeX-2-darwin.tar.xz TinyTeX-0.tgz TinyTeX-1.tgz TinyTeX.tgz TinyTeX-2.tgz --clobber

  tinitex:
    needs: [new-release]
    name: Get tinitex release
    runs-on: ubuntu-latest

    steps:
      - name: Get tinytex artifacts
        run: |
          echo ">> Will retrieve artifact from Quarto latexmk workflow"
          runId=$(gh run -R quarto-dev/quarto-cli list -w 'Test quarto-latexmk' --json 'headBranch,conclusion,databaseId' --jq 'map(select(.conclusion == "success" and .headBranch == "main")) | .[0].databaseId')
          gh run -R quarto-dev/quarto-cli download $runId -p tinitex-* --dir tinitex
        shell: bash

      - name: Repackage in per OS bundle
        working-directory: tinitex
        run: |
          pushd $(find . -maxdepth 1 -type d -name "*windows*")
          7z a -o.. tinitex.zip x86_64-pc-windows-msvc/.
          mv tinitex.zip ..
          popd
          pushd $(find . -maxdepth 1 -type d -name "*macOS*")
          7z a -ttar -so tinitex.tar aarch64-apple-darwin/. | 7z a -si -o.. tinitex.tgz
          mv tinitex.tgz ..
          popd
          pushd $(find . -maxdepth 1 -type d -name "*ubuntu*")
          7z a -ttar -so tinitex.tar x86_64-unknown-linux-gnu/. | 7z a -si -o.. tinitex.tar.gz
          mv tinitex.tar.gz ..
          popd

      - run: ls -lisa tinitex

      - name: Upload bundles
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          retry_wait_seconds: 10
          command: |
            cd tinitex/
            gh release upload ${{needs.new-release.outputs.draft-tag}} tinitex.zip tinitex.tgz tinitex.tar.gz --clobber

  deploy:
    needs: [validate-ctan, new-release, build-windows, build-linux, build-linux-arm64, build-mac, tinitex]
    runs-on: ubuntu-latest
    name: Publish new daily release

    steps:
      - name: Create release note
        run: |
          echo "This release contains the daily build of TinyTeX ($(date +'%A %B %d %Y %r %Z'))." > notes.md
          echo "Please see https://github.com/rstudio/tinytex-releases for more info." >> notes.md
          echo "" >> notes.md
          echo "## TeX Live version" >> notes.md
          echo "" >> notes.md
          echo '```' >> notes.md
          cat <<EOF >> notes.md
          ${{ needs.build-linux.outputs.tlmgr-version }}
          EOF
          echo '```' >> notes.md
          echo "" >> notes.md
          if [ "${{ needs.validate-ctan.outputs.texlive-year }}" != "unknown" ]; then
            echo "Built from CTAN repository: \`$CTAN_REPO\` (TeX Live ${{ needs.validate-ctan.outputs.texlive-year }})" >> notes.md
          else
            echo "Built from CTAN repository: \`$CTAN_REPO\`" >> notes.md
          fi

      - name: Publish new release
        run: |
          echo "::group::Move tag to last commit on master"
          sha=$(gh api repos/{owner}/{repo}/git/ref/heads/master --jq '.object.sha')
          gh api repos/{owner}/{repo}/git/refs/tags/daily -f sha=$sha --template 'Tag {{.ref | color "blue"}} moved on commit sha {{.object.sha | color "blue"}}.'
          echo -e "\n::endgroup::"
          echo "::group::undraft new and delete current release"
          old=$(gh release edit ${{needs.new-release.outputs.tag}} --draft=true | grep -o tag/[^/]*$ | cut -c 5-)
          gh release edit ${{needs.new-release.outputs.draft-tag}} --draft=false --notes-file notes.md
          gh release delete ${old} -y
          echo -e "\n::endgroup::"

  cleaning:
    needs: [new-release, deploy]
    if: ${{ failure() || cancelled() }}
    runs-on: ubuntu-latest
    name: Cleaning step in case of error
    steps:
      - name: Remove unused daily release
        run: |
          gh release delete ${{needs.new-release.outputs.draft-tag}} -y
